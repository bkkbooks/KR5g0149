body:
  text: 洞真太上倉元上録一卷洞真太上上皇民籍定真玉録一卷洞真太上倉元上録倉元上録一名太清內文又名玉鏡寶章又名金圖瓊字又名破淹洞符又名玄覽寶籙又名人鳥山經又名金生䇿文又名威武太一扶命玉晨君所修祕素靈上宫得而奉行能飛能沉能隱能顯位為真人也元氣流化凝上為天敷色翠碧故曰倉元文明運度惡殺好生戒示禍福學者鏡焉占候善惡即吉避凶出處得適動靜保全化導功立積德道成不知此訣徒勞勤求習他小益不免大災雖升二十八天之上猶不免墮落草蟲之中是以上真寶祕尤密子緣遇得閉口修之一切含氣禀倉元而生不知感悟更增善緣任性縱橫失其元氣蒼生之死皆由恣惡積滅身暫歡不久嬰苦長夜未測還期上聖哀愍演述妙氣標寫自然靈文題勒修善要法佩之服之存之誦之施行如科念念不怠不過九年必升三清也渺莾無極不可具言總號自然表名元氣元氣善應化而為形形象有稱大略目曰天地天地覆載含育倉生生氣倉倉衆色第一仰觀天形諦别其色精存其神乃得其氣氣降周身內外洞浹長生不死變化無窮至於人有利鈍平天有大中小小中大諸天羅列元數重纍諸地同亦無鞅旡數諸天各有三光七真元央諸地各有五嶽八溟昆崘須彌大小不同隨人感得有無各因所居利害依業受果有在濁而清有在清而濁有上智而位卑有下愚而爵貴有境大而凋荒有域小而豐實有居尊而憂戚有處賤而歡康有為男而頑懦有為女而雄強有外明而內暗有內照而外蒙或先下而後髙或先虛而後實或首正末邪或前邪終正或獨或群或同或異億品參差不可勝數旡數諸天共有此等唯大羅三天清純唯一一氣具足旡所闕焉有感斯應應迹億千有粗有妙有淺有深雖有重輕同是清純分化殊形源本一也隨其感緣依緣現迹有見氣候而悟者第一人也有見光音而悟者第二人也有見符圖而悟者第三人也有見文字而悟者第四人也有見形相而悟者第五人也有見言談而悟者第六人也有見影象而悟者第七人也有見華貴而悟者第八人也有見素賤而悟者第九人也有見顯通而悟者第十人也有見隱塞而悟者第十一人也有見中間而悟者第十二人也大品十二分階有三上中及下各有四焉習業不同因果各異在地十二升無極三清之天諸天之上也上學逰乎十二精錬宴乎三清宴乎三清無復為也有為為物非我所須也未登三清亦能為物為物為巳參雜行之或自為處少為物處多或為物處淺自為處深深淺有差遂成十二無淺無深乃升三上上三本一應接三階𥘉來未至三名未合至後既合無復三名下知有之强號為一一亦非名為衆名之主主不可無名故標之為一一統億兆嘉號羅生玄元始等太上尊神皆學者所須存呼為主並非實名名不去也上學之侣精解因緣體之無惑修之必專專之必效所志必成成由遵法法有三乘乘十二事事在經中上中下品三洞應運遞互出焉或時同現攝一切文一切文圖皆屬三洞三洞三清即是三乘三乘經戒各十二焉合為三十六部以度無量天人人緣厚薄得之不同或多或少或淺或深自非至德名在玉圖青録白簡不得具聞亦不具見亦不具解亦不具行各隨所獲漸進升階唯具足者乃登三清矣三清者玉清上清太清也三洞者洞真洞玄洞神也三徑者洞真上清也洞玄靈寶也洞神三皇也十二事者演說衆法心迹無為為不為物物得其賴本不為巳巳亦自全為之似關心迹心迹不在此為不見乞而施不見施而與不見之見見妙常存不可思議回邪使正應感而然然非我欲欲既無矣何有纍哉無纍之迹道之應形聖真神仙共所崇習習之合道第一事也心無為迹有為忘我為物為物德髙第二事也心有為迹無為間居少務省繁就約至于垂拱守靜無為而心思存想念是防非求善避惡第三事也捨家而處人間去親愛之著同人于世修德立功少𥝠寡欲第四事也携家入居山澤深藏以避可欲課督尊卑消喧以寂弊衣粗食研尋有無枕石漱流餐霞餌氣閴無出想第五事也出世與人隔絶不復顧戀君親一切都斷子巳孤棲修習師㫖第六事也在世和光同塵婚官不殊氣類晦明獨見華素不偏自學教人通塞適運堅志不變第七事也斷欲明斷去妻絶榖欲動即責躬窮居常禮懴念念願斷第八事也不斷自斷精存不滯妻妾羅列聲妓且陳尊卑歡樂調和以中無恣無逸唯法是從貴賤之儀不相僣濫慶集纂乎清風無滯以歸玄氣愼終如始第九事也逰空中中為志不著下不叨上怡性養神不傷萬物餘睱濟衆不損我躬積漸自升第十事也在地下居洞中守靜篤思神通隱淪旡悶第十一事也住天上處顯章流恩澤濟倉生挹元氣保長存尊嚴不虧第十二事也此十二事備在三乘三乘之學各有其人倫多受名乘成為號上洞為大乘中洞為中乘下洞為小乘大略舉之以其事多者為稱譬如目錦亦以其綵多者立名也此十二事又各有十二事一曰自然文字二名符䇿三曰注訣四曰圖象五曰譜録六曰戒律七曰威儀八曰方法九曰術數十曰記傳十一曰讃頌十二曰表奏行十二事者各有此十二階在三洞洞逹相通玄有少多隨因列導精解修之感驗必速不解漫求效則遲應迷昧不精行之無徴僻以望果更致考臻上學志人嚴加詳愼也破淹符如左凡生有境清少濁多穢障相纒行善不立邪氣來侵强魔玄試上學之人濁動徐清潔齊存思禁隔囂塵非類之子叨突去來家人他室或有産乳中外親表或有喪凶牢獄鬪訟六畜驚奔鳥沉交接悲泣血傷諸如此等見之不祥皆是穢濁淹藹生纒障結不𥼶暗昧亂神急宜沐浴存思即消但精思難精精防有法亦當擇日王相之辰清齊啓告受佩破淹之符九天之氣化為九鳳各首同身飛行三界引三清之妙氣蕩九地之囂塵佩身出入動靜常清衆濁不能汙群塵不敢干諸厄悉度延年無衰魂魄俱鎮同升玊清也某號太嵗某年某月朔某日某時某州郡縣鄉里男女姓名若干嵗謹請大度厄延年益算不衰破淹神符保守年命延度九厄明耳目療關節安魂定魄萬淹不干急急如太上九老律令洞真太上倉元上録
