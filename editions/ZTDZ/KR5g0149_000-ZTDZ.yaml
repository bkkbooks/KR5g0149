front:
  text: 二録同卷廣八
  hash: sha256:8a3213e172de3780731480e16bbf7a00c66aeae86139716ba575e2a1b627ebf2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0149_SJB_000-330583b, image: sjb/33/330583b.png}
body:
  text: 洞眞太上倉元上錄一卷洞眞太上上皇民籍定眞玉録一卷洞眞太上倉元上録倉元上錄一名太清内文又名玉鏡寳章又名金圖瓊字又名破淹洞符又名玄覽寳籙又名人鳥山經又名金生䇿文又名威武太一扶命玉晨君所修祕素靈上宫得而奉行能飛能沉能隱能顯位爲眞人也元炁流化凝上爲天敷色翠碧故曰倉元文明運度惡殺好生戒示禍福學者鏡焉占候善惡即吉避凶出䖏得適動靜保全化導功立積德道成不知此訣徒勞懃求習他小益不免大災雖昇二十八天之上猶不免墮落艸虫之中是以上眞寳祕尤宻子縁遇得閉口修之一切含炁禀倉元而生不知感悟更増善縁任性縱橫失其元炁蒼生之死皆由恣惡積滅身蹔懽不乆嬰苦長夜未測還期上聖哀愍演述妙炁標寫自然靈文題勒修善要法佩之服之存之誦之施行如科念念不怠不過九年必昇三清也渺莾无極不可具言總號自然表名元炁元炁善應化而爲形形象有稱大略目曰天地天地覆載含育倉生生氣倉倉衆色第一仰觀天形諦别其色精存其神乃得其氣氣降周身内外洞浹長生不死變化无窮至於人有利鈍平天有大中小小中大諸天羅列元數重累諸地同亦无鞅旡數諸天各有三光七真元央諸地各有五岳八溟崐崘須彌大小不同隨人感得有无各因所居利害依業受果有在濁而清有在清而濁有上智而位卑有下愚而爵貴有境大而凋荒有域小而豐實有居尊而憂慼有䖏賤而懽康有爲男而頑懦有爲女而雄強有外明而内闇有内照而外蒙或先下而後髙或先虚而後實或首正末邪或前邪終正或獨或群或同或異億品參差不可勝數旡數諸天共有此等唯大羅三天清純唯一一炁具足旡所闕焉有感斯應應迹億千有麄有妙有淺有深雖有重輕同是清純分化殊形源本一也隨其感縁依縁現迹有見氣候而悟者第一人也有見光音而悟者第二人也有見符圖而悟者第三人也有見文字而悟者第四人也有見形相而悟者第五人也有見言談而悟者第六人也有見影象而悟者第七人也有見華貴而悟者第八人也有見素賤而悟者第九人也有見顯通而悟者第十人也有見隱塞而悟者第十一人也有見中間而悟者第十二人也大品十二分階有三上中及下各有四焉習業不同因果各異在地十二昇无極三清之天諸天之上也上學逰乎十二精錬宴乎三清宴乎三清无復爲也有爲爲物非我所須也未登三清亦能爲物爲物爲巳參雜行之或自爲䖏少爲物䖏多或爲物䖏淺自爲䖏深深淺有差遂成十二无淺无深乃昇三上上三本一應接三階𥘉來未至三名未合至後旣合无復三名下知有之强號爲一一亦非名爲衆名之主主不可无名故標之爲一一統億兆嘉號羅生玄元始等太上尊神皆學者所須存呼爲主並非實名名不去也上學之侣精解因縁體之无惑修之必專專之必効所志必成成由遵法法有三乘乘十二事事在經中上中下品三洞應運逓互出焉或時同現攝一切文一切文圖皆屬三洞三洞三清即是三乗三乗經戒各十二焉合爲三十六部以度无量天人人縁厚薄得之不同或多或少或淺或深自非至德名在玉圖青録白簡不得具聞亦不具見亦不具解亦不具行各隨所獲漸進昇階唯具足者乃登三清矣三清者玉清上清太清也三洞者洞眞洞玄洞神也三徑者洞眞上清也洞玄靈寳也洞神三皇也十二事者演說衆法心迹无爲爲不爲物物得其賴本不爲巳巳亦自全爲之似關心迹心迹不在此爲不見乞而施不見施而與不見之見見妙常存不可思議逥邪使正應感而然然非我欲欲旣无矣何有累哉无累之迹道之應形聖眞神仙共所崇習習之合道第一事也心无爲迹有爲忘我爲物爲物德髙第二事也心有爲迹无爲閑居少務省繁就約至于垂拱守静无爲而心思存想念是防非求善避惡第三事也捨家而䖏人間去親愛之著同人于世修德立功少𥝠寡欲第四事也携家入居山澤深藏以避可欲課督尊卑消諠以寂弊衣麄食研尋有无枕石漱流餐霞餌炁閴无出想第五事也出世與人隔絶不復顧戀君親一切都斷子巳孤棲修習師㫖第六事也在世和光同塵婚官不殊炁𩔗晦明獨見華素不偏自學教人通塞適運堅志不變第七事也斷欲明斷去妻絶榖欲動即責躬窮居常禮懴念念願斷第八事也不斷自斷精存不滯妻妾羅列聲妓且陳尊卑懽樂調和以中无恣无逸唯法是從貴賤之儀不相僣濫慶集纂乎清風无滯以歸玄炁愼終如始第九事也逰空中中爲志不著下不叨上怡性養神不傷萬物餘睱濟衆不損我躬積漸自昇第十事也在地下居洞中守静篤思神通隱淪旡悶第十一事也住天上䖏顯章流恩澤濟倉生挹元炁保長存尊嚴不虧第十二事也此十二事備在三乗三乗之學各有其人倫多受名乘成爲號上洞爲大乘中洞爲中乘下洞爲小乘大略舉之以其事多者爲稱譬如目錦亦以其綵多者立名也此十二事又各有十二事一曰自然文字二名符䇿三曰注訣四曰圖象五曰譜録六曰戒律七曰威儀八曰方法九曰術數十曰記傳十一曰讃頌十二曰表奏行十二事者各有此十二階在三洞洞逹相通玄有少多隨因列導精解修之感驗必速不解漫求効則遲應迷昧不精行之无徴僻以望果更致考臻上學志人嚴加詳愼也破淹符如左凡生有境清少濁多穢障相纒行善不立邪氣來侵强魔玄試上學之人濁動徐清潔齋存思禁隔囂塵非𩔗之子叨突去來家人他室或有産乳中外親表或有喪凶牢獄闘訟六畜驚奔鳥沉交接悲泣血傷諸如此等見之不祥皆是穢濁淹藹生纒障結不𥼶闇昧亂神急宜沐浴存思即消但精思難精精防有法亦當擇日王相之辰清齋啓告受佩破淹之符九天之炁化爲九鳳各首同身飛行三界引三清之妙炁蕩九地之囂塵佩身出入動静常清衆濁不能洿群塵不敢干諸厄悉度延年无衰魂魄俱鎭同昇玊清也某號太嵗某年某月朔某日某時某州郡縣郷里男女姓名若干嵗謹請大度厄延年益筭不衰破淹神符保守年命延度九厄明耳目療關節安魂定魄萬淹不干急急如太上九老律令洞眞太上倉元上録
